name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Run flutter doctor
        run: flutter doctor

      - name: Get dependencies
        run: flutter pub get

      - name: Generate Hive code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK for arm64
        run: flutter build apk --release --target-platform android-arm64

      - name: Rename APK
        run: |
          mkdir output
          cp build/app/outputs/flutter-apk/app-release.apk output/findmyshade_arm64.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: findmyshade_arm64
          path: output/findmyshade_arm64.apk
          retention-days: 7