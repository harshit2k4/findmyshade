name: findmyshade
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  get: ^4.6.6

  # Image
  image_picker: ^1.1.2
  image: ^4.1.7

  # ML Kit
  google_mlkit_face_detection: ^0.11.0

  # UI
  glassmorphism: ^3.0.0

  # Local Data
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  
  assets:
    - assets/data/
    - assets/images/
    - assets/icons/
